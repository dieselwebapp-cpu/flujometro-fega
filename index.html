<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Técnico - Fega SRL</title>
    <!-- Librerías Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Agregado overflow-x: hidden para evitar que la pantalla se deslice a los costados en celulares */
        body { background: #e0e5ec; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; margin: 0; padding: 20px 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        #app-root { width: 100%; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* Contenedor estricto para 1 sola hoja A4 */
        #report-sheet {
            background: white;
            width: 210mm;
            height: 295mm; /* Fijo, levemente inferior a 297 para encajar exacto en PDF */
            padding: 12mm 15mm; /* Márgenes reducidos para hacer espacio al cliente */
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden; 
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #0055AA; padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { color: #0055AA; margin: 0; font-size: 28px; }
        .badge-valid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        
        .section-title { font-size: 16px; color: #FFA500; border-bottom: 1px solid #eee; padding-bottom: 4px; margin-top: 15px; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-box { background: #f8f9fa; padding: 10px; border-radius: 6px; border-left: 4px solid #0055AA; }
        .info-label { font-size: 11px; color: #666; text-transform: uppercase; display: block; }
        .info-value { font-size: 16px; color: #333; font-weight: bold; margin-top: 3px; display: block; word-wrap: break-word;}
        
        .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .result-card { background: white; border: 2px solid #eee; padding: 15px; text-align: center; border-radius: 8px; }
        .result-card.highlight { border-color: #FFA500; background: #fffdf5; }
        .result-card .val { font-size: 28px; font-weight: bold; color: #0055AA; margin: 8px 0; }
        
        .footer { position: absolute; bottom: 12mm; left: 15mm; right: 15mm; font-size: 10px; color: #888; text-align: center; border-top: 1px solid #eee; padding-top: 8px; }

        .btn-descarga { background: #0055AA; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; width: 90%; max-width: 400px; transition: background 0.3s;}
        .btn-descarga:hover { background: #004488; }

        /* Estilos del PopUp Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-box { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .modal-box h2 { color: #0055AA; margin-top: 0; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .modal-box label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: bold; }
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .modal-box textarea { resize: vertical; max-height: 100px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel { background: #888; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
        .btn-confirm { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Múltiples escalas responsivas para asegurar que encaje en todas las pantallas sin desbordarse */
        @media screen and (max-width: 850px) { #report-sheet { transform: scale(0.8); transform-origin: top center; margin-bottom: -20%; } }
        @media screen and (max-width: 600px) { #report-sheet { transform: scale(0.55); transform-origin: top center; margin-bottom: -45%; } }
        @media screen and (max-width: 450px) { #report-sheet { transform: scale(0.42); transform-origin: top center; margin-bottom: -58%; } .btn-descarga { font-size: 14px; padding: 12px 15px;} }
        
        /* Clase especial para desactivar el recorte visual justo antes de generar el PDF */
        .pdf-export-mode { transform: none !important; margin: 0 !important; }
    </style>
</head>
<body>

    <!-- DOM PRINCIPAL -->
    <div id="app-root"></div>

    <!-- MODAL DE CLIENTE -->
    <div id="clientModal" class="modal-overlay">
        <div class="modal-box">
            <h2>Datos Adicionales (Opcional)</h2>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Complete estos datos para que aparezcan impresos en el PDF.</p>
            
            <label>Nombre del Cliente / Empresa</label>
            <input type="text" id="cliName" placeholder="Ej: Transportes del Norte">
            
            <label>Teléfono de Contacto</label>
            <input type="text" id="cliPhone" placeholder="Ej: +54 9 11 1234-5678">
            
            <label>Observaciones del Ensayo</label>
            <textarea id="cliObs" rows="3" placeholder="Ej: Se reemplazó el filtro interno..."></textarea>
            
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-confirm" onclick="procesarYGenerarPDF()">✔ Generar Archivo</button>
            </div>
        </div>
    </div>

    <script>
        // ==============================================================
        // LLAVE PÚBLICA DE REPORTES (Formato PKCS#8 Público / prime256v1)
        // ==============================================================
        const publicKeyPEM = `-----BEGIN PUBLIC KEY-----
MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE/k2ZI89svibH1L9CWVLzCNDemNgD
aN1NOedS4Zt+6PyZPeB+yeWiJsttCNZ6KncgLJxWnkVfj0zStekrOwUPzg==
-----END PUBLIC KEY-----`;
        // ==============================================================

        function renderError() {
            document.getElementById('app-root').innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 6px solid #dc3545; max-width: 500px; margin-top: 10vh;">
                    <h1 style="color: #dc3545; margin-top: 0;">❌ ACCESO DENEGADO</h1>
                    <p style="color: #666; font-size: 16px;">Este reporte no existe, la firma criptográfica es inválida o los datos fueron alterados.</p>
                </div>
            `;
        }

        function renderReporteAutorizado(datos) {
            document.getElementById('app-root').innerHTML = `
                <button class="btn-descarga" onclick="abrirModal()">📥 Agregar Datos y Descargar PDF</button>
                <div id="report-sheet">
                    <div class="header">
                        <div>
                            <h1>FEGA SRL</h1>
                            <p style="margin: 5px 0;">Reporte Técnico de Flujometría Digital</p>
                            <p style="font-size: 12px; color: #555; margin-top: 5px;">Fecha de Ensayo: ${new Date().toLocaleString()}</p>
                        </div>
                        <div class="badge-valid">✔ ORIGEN AUTÉNTICO</div>
                    </div>

                    <!-- Contenedor inyectable para el Cliente -->
                    <div id="client-section-container" style="display: none;"></div>

                    <div class="section-title">Datos del Componente</div>
                    <!-- ORDEN SOLICITADO: Marca, Modelo, Aplicación, Tipo -->
                    <div class="grid-info">
                        <div class="info-box"><span class="info-label">Marca</span><span class="info-value">${datos.ma}</span></div>
                        <div class="info-box"><span class="info-label">Modelo / Código</span><span class="info-value">${datos.mo}</span></div>
                        <div class="info-box"><span class="info-label">Aplicación</span><span class="info-value">${datos.ap}</span></div>
                        <div class="info-box"><span class="info-label">Tipo</span><span class="info-value">${datos.t}</span></div>
                    </div>

                    <div class="section-title">Parámetros de Referencia</div>
                    <div class="grid-info">
                        <div class="info-box" style="border-left-color: #28a745;"><span class="info-label">Rango Esperado Mínimo</span><span class="info-value">${datos.rmn}</span></div>
                        <div class="info-box" style="border-left-color: #dc3545;"><span class="info-label">Rango Esperado Máximo</span><span class="info-value">${datos.rmx}</span></div>
                    </div>

                    <div class="section-title">Resultados del Ensayo</div>
                    <div class="results-grid">
                        <div class="result-card"><div style="font-size: 13px; color: #666;">Duración Prueba</div><div class="val">${datos.timeStr}</div><div style="font-size: 13px; color: #666;">Tiempo</div></div>
                        <div class="result-card"><div style="font-size: 13px; color: #666;">Caudal Pico</div><div class="val">${datos.pk}</div><div style="font-size: 13px; color: #666;">L/min</div></div>
                        <div class="result-card highlight"><div style="font-size: 13px; color: #666;">Promedio Estable</div><div class="val">${datos.avg}</div><div style="font-size: 13px; color: #666;">L/min</div></div>
                    </div>
                    
                    <div class="footer">
                        Documento generado automáticamente por Equipo Oficial Flujómetro Fega SRL.<br>
                        La integridad e inalterabilidad de los valores numéricos están garantizadas por Criptografía ECDSA SHA-256.
                    </div>
                </div>
            `;
        }

        function decodificarTipos(t) {
            if(t === 't') return 'Tobera';
            if(t === 'i') return 'Inyector';
            if(t === 'l') return 'Modo Libre';
            return 'Desconocido';
        }

        // ================== LOGICA DEL MODAL Y PDF ==================
        function abrirModal() {
            document.getElementById('clientModal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('clientModal').style.display = 'none';
        }

        function procesarYGenerarPDF() {
            const nom = document.getElementById('cliName').value.trim();
            const tel = document.getElementById('cliPhone').value.trim();
            const obs = document.getElementById('cliObs').value.trim();
            const container = document.getElementById('client-section-container');

            if (nom || tel || obs) {
                // Se agrega font-family especifico al textarea de observaciones para prevenir desajustes de fuente en móviles
                container.innerHTML = `
                    <div class="section-title" style="color: #0055AA;">Datos del Cliente</div>
                    <div class="grid-info" style="margin-bottom: 15px;">
                        <div class="info-box"><span class="info-label">Cliente / Empresa</span><span class="info-value">${nom || '-'}</span></div>
                        <div class="info-box"><span class="info-label">Teléfono</span><span class="info-value">${tel || '-'}</span></div>
                        ${obs ? `<div class="info-box" style="grid-column: span 2;"><span class="info-label">Observaciones</span><span class="info-value" style="font-size: 14px; font-weight: normal; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;">${obs}</span></div>` : ''}
                    </div>
                `;
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }

            cerrarModal();

            // FORZAR EL SCROLL A CERO: 
            // Esta es la solución crítica para que html2canvas no genere la mitad superior en blanco
            // por culpa del teclado del celular moviendo la pantalla.
            window.scrollTo(0, 0);

            setTimeout(() => {
                const elemento = document.getElementById('report-sheet');
                
                // Desactivamos temporalmente el escalado CSS para que el PDF salga en A4 puro
                elemento.classList.add('pdf-export-mode');

                const nombreArchivo = 'Reporte_Fega_' + (new URLSearchParams(window.location.search).get('mo') || 'Libre') + '.pdf';
                
                const opciones = {
                    margin:       0,
                    filename:     nombreArchivo,
                    image:        { type: 'jpeg', quality: 1.0 },
                    // scrollY: 0 blinda la librería frente a rebotes de scroll en celulares
                    html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                // Una vez que termina de guardar el PDF, restauramos la vista del celular
                html2pdf().set(opciones).from(elemento).save().then(() => {
                    elemento.classList.remove('pdf-export-mode');
                });
            }, 300);
        }

        // ================== VERIFICACIÓN CRIPTOGRÁFICA ==================
        window.onload = function() {
            const qs = window.location.search;
            if (!qs || !qs.includes('&s=')) return renderError();

            const partes = qs.substring(1).split('&s=');
            const urlRawData = partes[0];
            const firmaB64URL = partes[1];

            if (!firmaB64URL || firmaB64URL.startsWith('ERROR_LLAVE')) return renderError();

            // Decodificamos %20 a espacios reales para que el SHA-256 coincida exacto con el ESP32
            const payloadDecodificado = decodeURIComponent(urlRawData);

            let b64Firma = firmaB64URL.replace(/-/g, '+').replace(/_/g, '/');
            while (b64Firma.length % 4 !== 0) b64Firma += '=';

            try {
                // Función global correcta de jsrsasign para pasar base64 a Hexadecimal
                const hexFirma = b64tohex(b64Firma);
                
                const sig = new KJUR.crypto.Signature({"alg": "SHA256withECDSA"});
                sig.init(publicKeyPEM);
                sig.updateString(payloadDecodificado); // Sometemos a prueba el payload

                if (sig.verify(hexFirma)) {
                    // Si pasó, extraemos y formateamos los datos
                    const params = new URLSearchParams(payloadDecodificado);
                    
                    // Lógica para formatear los segundos
                    let duracionSegundos = parseInt(params.get('sg') || '0', 10);
                    let tiempoFormateado = "";
                    if (duracionSegundos < 60) {
                        tiempoFormateado = duracionSegundos + "s";
                    } else {
                        tiempoFormateado = Math.floor(duracionSegundos / 60) + "m " + (duracionSegundos % 60) + "s";
                    }

                    renderReporteAutorizado({
                        t: decodificarTipos(params.get('t')),
                        ma: params.get('ma') || 'N/A',
                        mo: params.get('mo') || 'N/A',
                        ap: params.get('ap') || 'N/A',
                        rmn: (params.get('rmn') || '0.0') + ' L/min',
                        rmx: (params.get('rmx') || '0.0') + ' L/min',
                        pk: params.get('pk') || '0.00',
                        avg: params.get('avg') || '0.00',
                        timeStr: tiempoFormateado
                    });

                    // ==============================================================
                    // EXTRACCIÓN DE DATOS SILENCIOSA HACIA GOOGLE SHEETS
                    // ==============================================================
                    const googleAppScriptURL = "https://script.google.com/macros/s/AKfycbwR2YjJAVVFUaAS8PmvYMMDc9vMq8LuzgbWqqnA3x_LX1XHSwAfzbB64m3X8pqv4SMD/exec";
                    
                    let formData = new FormData();
                    formData.append("payload", payloadDecodificado);
                    formData.append("firma", firmaB64URL);

                    fetch(googleAppScriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    }).catch(function(e) {
                        // Ignoramos silenciosamente si falla (ej: sin conexión o bloqueador de red)
                    });
                    // ==============================================================

                } else {
                    renderError();
                }
            } catch (e) {
                renderError();
            }
        };
    </script>
</body>
</html>
